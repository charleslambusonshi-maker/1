<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading DIDAS...</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#7b56a3">

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ===== BODY ===== */
body{
  height:100vh;
  background: linear-gradient(180deg,#2d0036,#82009c);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  position:relative;
  transition: opacity 0.6s ease;
}

/* ===== PARTICLES FIXED ===== */
body::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    radial-gradient(2px 2px at 20px 30px,#ffd700,transparent),
    radial-gradient(2px 2px at 40px 70px,#ffd70088,transparent),
    radial-gradient(1px 1px at 90px 40px,#7b56a3,transparent),
    radial-gradient(1px 1px at 130px 80px,#ffffff66,transparent);
  background-size:200px 100px;
  animation: float 25s linear infinite;
  opacity:0.25;
  z-index:0;
}

/* ===== LOGO ===== */
.logo{
  font-size:clamp(3rem,10vw,6rem);
  font-weight:900;
  background: linear-gradient(135deg,#ffd700,#fff,#ffd700);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:10px;
  animation: floatLogo 3s ease-in-out infinite;
}

.subtitle{
  color:#fff;
  opacity:0.9;
  margin-bottom:30px;
}

/* ===== SPINNER ===== */
.spinner{
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid transparent;
  border-top:4px solid #ffd700;
  animation: spin 1s linear infinite;
  margin-bottom:30px;
}

/* ===== PROGRESS ===== */
.progress{
  width:250px;
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7b56a3,#ffd700);
  animation: load 3.5s forwards;
}

.text{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}

/* ===== ANIMATIONS ===== */
@keyframes spin{
  to{ transform:rotate(360deg); }
}

@keyframes load{
  to{ width:100%; }
}

@keyframes float{
  from{ transform:translateY(0); }
  to{ transform:translateY(-30px); }
}

@keyframes floatLogo{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-10px); }
}

/* ===== FADE OUT ===== */
.fade-out{
  opacity:0;
}

/* ===== MOBILE ===== */
@media(max-width:480px){
  .progress{ width:200px; }
  .spinner{ width:70px; height:70px; }
}

</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('✅ Service Worker Registered'))
      .catch(err => console.log('❌ SW Error:', err));
  });
}
</script>
<body>

<div class="logo">DIDAS</div>
<div class="subtitle">Loading System...</div>

<div class="spinner"></div>

<div class="progress">
  <div class="progress-bar"></div>
</div>

<div class="text">Preparing Smart Attendance...</div>

<script>
setTimeout(() => {
  window.location.href = "/homepage.html";
}, 2500);
</script>

</body>
</html>
